<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatBot</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function ChatInput({
        chatMessages,
        setChatMessages,
        isTyping,
        setIsTyping,
      }) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          if (!inputText.trim() || isTyping) return;

          const newMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];
          setChatMessages(newMessages);
          setInputText("");

          setIsTyping(true);

          setTimeout(() => {
            const response = Chatbot.getResponse(inputText);
            setChatMessages([
              ...newMessages,
              {
                message: response,
                sender: "robot",
                id: crypto.randomUUID(),
              },
            ]);
            setIsTyping(false);
          }, 2000);
        }

        return (
          <div className="chat-input-container">
            <input
              placeholder="Send a message to Chatbot"
              onChange={saveInputText}
              value={inputText}
              className="chat-input"
              onKeyDown={(e) => e.key === "Enter" && sendMessage()}
            />
            <button onClick={sendMessage} className="send-btn">
              Send
            </button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        return (
          <div
            className={
              sender === "user" ? "chat-message-user" : "chat-message-robot"
            }
          >
            {sender === "robot" && (
              <img
                src="images/robot.png"
                className="chat-message-profile"
                alt="Robot"
              />
            )}
            <div className="chat-message-text">{message}</div>
            {sender === "user" && (
              <img
                src="images/user.png"
                className="chat-message-profile"
                alt="You"
              />
            )}
          </div>
        );
      }

      function ChatMessages({ chatMessages, isTyping }) {
        const chatMessagesRef = React.useRef(null);

        React.useEffect(() => {
          const container = chatMessagesRef.current;
          if (container) {
            container.scrollTop = container.scrollHeight;
          }
        }, [chatMessages, isTyping]);

        return (
          <div className="chat-messages-container" ref={chatMessagesRef}>
            {chatMessages.map((chatMessage) => (
              <ChatMessage
                key={chatMessage.id}
                message={chatMessage.message}
                sender={chatMessage.sender}
              />
            ))}
            {isTyping && <TypingIndicator />}
          </div>
        );
      }

      function TypingIndicator() {
        return (
          <div className="typing-indicator">
            <img
              src="images/robot.png"
              className="chat-message-profile"
              alt="Robot"
            />
            <div className="typing-bubble">
              <div className="typing-dot"></div>
              <div className="typing-dot"></div>
              <div className="typing-dot"></div>
            </div>
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([]);
        const [isTyping, setIsTyping] = React.useState(false);
        const [inputAtBottom, setInputAtBottom] = React.useState(true);

        return (
          <div className="app-container">
            {!inputAtBottom && (
              <ChatInput
                chatMessages={chatMessages}
                setChatMessages={setChatMessages}
                isTyping={isTyping}
                setIsTyping={setIsTyping}
              />
            )}

            <ChatMessages chatMessages={chatMessages} isTyping={isTyping} />

            {inputAtBottom && (
              <ChatInput
                chatMessages={chatMessages}
                setChatMessages={setChatMessages}
                isTyping={isTyping}
                setIsTyping={setIsTyping}
              />
            )}

            <div
              className="toggle-text"
              onClick={() => setInputAtBottom(!inputAtBottom)}
            >
              {inputAtBottom
                ? "⬆️ Click here to move the input box to the top"
                : "⬇️ Click here to move the input box to the bottom"}
            </div>
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
